name: Push to Hugging Face Spaces

on:
  push:
    branches:
      - Elian
    paths:
      - 'API/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Push a Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          mkdir deploy_hf

          cp -r API/src deploy_hf/
          cp API/Dockerfile deploy_hf/
          cp API/package.json deploy_hf/
          cp API/README.md deploy_hf/
          
          cp API/package-lock.json deploy_hf/ 2>/dev/null || true

          cd deploy_hf
          git init
          git checkout -b main
          git add .
          git commit -m "Deploy limpio: Solo src, Dockerfile, package.json y README.md"
          
          git remote add hf https://user:$HF_TOKEN@huggingface.co/spaces/datascope26/datascope-api
          git push hf main --force