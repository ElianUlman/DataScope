<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section style="width: 300px; padding: 10px;">
        
        <div id="sinSesion">
            <h1 id="titulo-app">Data Scope</h1>

            <form id="sesion">
                <input type="text" name="Mail" placeholder="Tu mail..." id="mail" required style="display: block; margin-bottom: 5px; width: 100%;">
                <input type="password" name="pwd" placeholder="Contraseña" id="pwd" required style="display: block; margin-bottom: 5px; width: 100%;">
                <button type="submit">Enviar</button>
            </form>

            <p id="reg-feedback"></p>
        </div>

        <div id="conSesion" style="display: none;">
            
            <a href="https://datascope-orhf.onrender.com/">Ir a Datascope</a>
            <button id="btn-privateMode"></button>
            <button id="btn-logout" style="margin-top: 10px;">Cerrar Sesión</button>
        </div>

    </section>

    <script src="popup.js"></script>
</body>
</html>
