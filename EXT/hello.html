<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>

<section>
    <div>
        <h1 id="mensaje">Data Scope</h1>

        <form id="sesion">
            <input type="text" name="companyName" placeholder="Nombre de la compania" id="companyName">
            <input type="password" name="pwd" placeholder="contraseña" id="pwd">
            <button type="submit">Enviar</button>
        </form>
        <p id="login-feedback"></p>

        <form id="registro">
            <input type="text"     name="name"     placeholder="Nombre"     id="regName">
            <input type="email"    name="email"    placeholder="Email"      id="regEmail">
            <input type="password" name="password" placeholder="Contraseña" id="regPwd">
            <button type="submit">Registrarse</button>
        </form>

        <p id="reg-feedback"></p>
    </div>
    <script src="popup.js"></script>
    <script src="content.js"></script>
</section>

</html>
